name: Deploy to Tencent Cloud

on:
  push:
    branches: ["main"]
    paths:
      - "package.json"
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version-check.outputs.version_changed }}
      current_version: ${{ steps.version-check.outputs.current_version }}
      previous_version: ${{ steps.version-check.outputs.previous_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check package.json version change
        id: version-check
        shell: bash
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "previous_version=manual" >> "$GITHUB_OUTPUT"
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "Manual workflow dispatch detected, continue deploy."
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"

          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "previous_version=unknown" >> "$GITHUB_OUTPUT"
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "No previous commit SHA available, continue deploy."
            exit 0
          fi

          PREVIOUS_VERSION=$(git show "${BEFORE_SHA}:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
          echo "previous_version=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREVIOUS_VERSION -> $CURRENT_VERSION"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            echo "package.json changed but version stayed at $CURRENT_VERSION, skip deploy."
          fi

  build-and-deploy:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Generate package-lock.json
        run: npm install --package-lock-only

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: "--max_old_space_size=1024000"

      - name: Deploy to Tencent Cloud
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "www/**"
          target: "/www/wwwroot/49.232.186.238_1522"
          rm: false
          strip_components: 1
          overwrite: true
          command_timeout: "10m"
          timeout: "10m"
          debug: true

      - name: Deploy to 1s.design/tools
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "www/**"
          target: "/www/wwwroot/1s.design/tools"
          rm: false
          strip_components: 1
          overwrite: true
          command_timeout: "10m"
          timeout: "10m"
          debug: true

      - name: Send Feishu Notification
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '🚀' : '❌';
            const message = {
              msg_type: "text",
              content: {
                text: `${emoji} 部署${status === 'success' ? '成功' : '失败'}通知\n\n项目: ${{ github.repository }}\n分支: ${{ github.ref }}\n提交者: ${{ github.actor }}\n提交信息: ${{ github.event.head_commit.message }}\n版本变更: ${{ needs.check-version.outputs.previous_version }} -> ${{ needs.check-version.outputs.current_version }}\n部署时间: ${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}\n状态: ${status === 'success' ? '✅ 成功' : '❌ 失败'}`
              }
            };
            
            await fetch('${{ secrets.FEISHU_WEBHOOK_URL }}', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(message)
            }); 
