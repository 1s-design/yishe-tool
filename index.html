<!DOCTYPE html>
<html class="notranslate" translate="no">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="" />
    <meta name="viewport"
        content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1,user-scalable=no, viewport-fit=cover">

    <meta name="google" content="notranslate" />
    <title>衣设 - 在线设计工具</title>
    <meta name="description" content="衣设网,衣设,1s,1s.design免费在线服装设计,平面设计">
    <meta name="keywords" content="衣设网,衣设,1s,1s.design,服装设计,免费设计,在线服装设计,diy服装,自定义服装,diy,自定义,图片设计，艺术字设计，印章设计，春联设计">
    <link data-react-helmet="true" rel="icon" type="image/png" href="/favicon.png" sizes="16x16">
</head>

<body>
    <div id="app">
        <style>
            html,
            body,
            #app {
                width: 100%;
                height: 100%;
                font-size: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0;
                background: #0f1115;
                color: #f5f7fa;
            }

            .app-loading-shell {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%;
                min-height: 100%;
                padding: 24px;
                background: #0f1115;
                color: #f5f7fa;
                box-sizing: border-box;
            }

            .app-loading-shell__stage {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
                width: min(100%, 320px);
                text-align: center;
            }

            .app-loading-shell__text {
                display: flex;
                align-items: center;
                min-height: 24px;
            }

            .app-loading-shell__text p {
                position: relative;
                margin: 0;
                color: #f5f7fa;
                font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
                font-size: clamp(16px, 1.6vw, 18.4px);
                font-weight: 500;
                letter-spacing: -0.03em;
                line-height: 1.2;
            }

            .app-loading-shell__text p::after {
                position: absolute;
                left: calc(100% + 0.08em);
                animation: app-loading-dots 3s infinite linear;
                color: #f5f7fa;
                content: '';
            }

            @keyframes app-loading-dots {
                0% {
                    content: '';
                }

                10% {
                    content: '.';
                }

                40% {
                    content: '..';
                }

                70% {
                    content: '...';
                }

                100% {
                    content: '';
                }
            }

            @media (max-width: 640px) {
                .app-loading-shell {
                    padding: 20px;
                }

                .app-loading-shell__stage {
                    width: min(100%, 280px);
                    gap: 6px;
                }

                .app-loading-shell__text {
                    min-height: 22.4px;
                }

                .app-loading-shell__text p {
                    font-size: 15.2px;
                }
            }
        </style>

        <div class="app-loading-shell" role="status" aria-live="polite" aria-label="1s design tool">
            <div class="app-loading-shell__stage">
                <div class="app-loading-shell__text">
                    <p>1s design tool</p>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./src/modules/main/main.ts"></script>
</body>

</html>
